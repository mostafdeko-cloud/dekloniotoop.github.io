<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome FIX -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
}

.logo-section{
display:flex;
flex-direction:column;
gap:5px;
}

@keyframes float{
0%{ transform:translateY(0); }
50%{ transform:translateY(-6px); }
100%{ transform:translateY(0); }
}

.logo{
font-size:32px;
font-weight:700;
animation:float 3s ease-in-out infinite;
}

.sub-logo{
font-size:20px;
color:#38bdf8;
font-weight:500;
}

.tagline{
font-size:16px;
color:#a1a1aa;
}

/* CONTACT */
.contact a{
color:white;
text-decoration:none;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}

/* BUTTONS */
.buttons{
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
padding:12px 28px;
border-radius:50px;
text-decoration:none;
font-weight:600;
font-size:14px;
transition:.3s;
background:#38bdf8;
color:white;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 10px 20px rgba(56,189,248,.4);
}

/* SECTION TITLE */
.section-title{
font-size:28px;
font-weight:700;
margin-top:60px;
margin-bottom:20px;
color:#38bdf8;
}

/* GRID */
.package-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
gap:25px;
margin-top:20px;
justify-items:center;
}

.box{
width:200px;
height:200px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
}

.tall-box{
width:200px;
height:300px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
}

.banner-box{
width:100%;
height:220px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
grid-column:1 / -1;
}

.box:hover,
.tall-box:hover,
.banner-box:hover{
transform:translateY(-8px) scale(1.02);
border:1px solid #444;
box-shadow:0 20px 30px rgba(0,0,0,.7);
}

.box img,
.tall-box img,
.banner-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
display:flex;
align-items:center;
justify-content:center;
z-index:999;

opacity:0;
visibility:hidden;
transition:.3s;
}

#lightbox.show{
opacity:1;
visibility:visible;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

/* RESPONSIVE */
@media(max-width:600px){

body{
padding:20px;
}

.logo{font-size:26px;}
.sub-logo{font-size:18px;}
.tagline{font-size:14px;}

.package-grid{
grid-template-columns:1fr;
}

.box,
.tall-box{
width:100%;
max-width:320px;
}

.buttons{
justify-content:center;
}
}
</style>
</head>

<body>

<div class="header">
<div class="logo-section">
<div class="logo">deklonio</div>
<div class="sub-logo">website</div>
<div class="tagline">The best designer</div>
</div>

<div class="contact">
<a href="https://wa.me/201037011985" target="_blank">
<i class="fa-brands fa-whatsapp"></i> +201037011985
</a>
</div>
</div>

<!-- Buttons -->
<div class="buttons">
<a href="#logos" class="btn">Logos</a>
<a href="#banners" class="btn">Banners</a>
<a href="packages.html" class="btn">Packages</a>
<a href="#prices" class="btn">Price lists</a>
</div>

<!-- LOGOS -->
<div id="logos" class="section-title">Logos</div>
<div class="package-grid">
<div class="box"><img src="logo1.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo2.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo3.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo4.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo5.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo6.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo7.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo8.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo9.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo10.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo11.png" loading="lazy" alt=""></div>
<div class="box"><img src="logo12.png" loading="lazy" alt=""></div>
</div>

<!-- BANNERS -->
<div id="banners" class="section-title">Banners</div>
<div class="package-grid">
<div class="banner-box"><img src="banner1.png" loading="lazy" alt=""></div>
<div class="banner-box"><img src="banner2.png" loading="lazy" alt=""></div>
<div class="banner-box"><img src="banner3.png" loading="lazy" alt=""></div>
<div class="banner-box"><img src="banner4.png" loading="lazy" alt=""></div>
<div class="banner-box"><img src="banner5.png" loading="lazy" alt=""></div>
</div>

<!-- PRICES -->
<div id="prices" class="section-title">Price Lists</div>
<div class="package-grid">
<div class="box"><img src="price1.png" loading="lazy" alt=""></div>
<div class="box"><img src="price2.png" loading="lazy" alt=""></div>
<div class="box"><img src="price3.png" loading="lazy" alt=""></div>
<div class="box"><img src="price4.png" loading="lazy" alt=""></div>
<div class="box"><img src="price5.png" loading="lazy" alt=""></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<img src="" alt="">
</div>

<script>
const lightbox = document.getElementById("lightbox");
const lightImg = lightbox.querySelector("img");

document.querySelectorAll(".package-grid img").forEach(img=>{
img.addEventListener("click",()=>{
lightImg.src = img.src;
lightbox.classList.add("show");
});
});

lightbox.addEventListener("click",()=>{
lightbox.classList.remove("show");
});

document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
lightbox.classList.remove("show");
}
});
</script>

</body>
</html>
