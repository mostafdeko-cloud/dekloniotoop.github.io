<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:white;padding:40px;}

/* header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:50px;}
.logo{font-size:32px;font-weight:700;letter-spacing:2px;}
.contact a{color:white;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:8px;}
.contact a i{color:white;}

/* menu */
.menu{display:flex;gap:20px;margin-bottom:60px;flex-wrap:wrap;}
.menu a{text-decoration:none;color:white;padding:8px 20px;border-radius:25px;background:#00bfff;font-size:14px;transition:.3s;}
.menu a:hover{transform:translateY(-4px);opacity:.8;}

/* sections */
.section{margin-bottom:80px;}
.section h2{margin-bottom:30px;font-size:28px;}

/* grid for logos and packages */
.grid{display:grid;grid-template-columns:repeat(auto-fill,200px);gap:25px;justify-content:center;}

/* boxes */
.box{width:200px;height:200px;background:#151515;border-radius:15px;overflow:hidden;border:1px solid #222;transition:.3s;cursor:pointer;}
.box:hover{transform:translateY(-8px);border:1px solid #555;box-shadow:0 15px 25px rgba(0,0,0,0.6);}
.box img{width:100%;height:100%;object-fit:cover;transition: transform .3s ease;}

/* banners */
.banner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px;}
.banner-box{width:100%;height:150px;background:#151515;border-radius:15px;overflow:hidden;border:1px solid #222;transition:.3s;cursor:pointer;}
.banner-box:hover{transform:translateY(-8px);border:1px solid #555;box-shadow:0 15px 25px rgba(0,0,0,0.6);}
.banner-box img{width:100%;height:100%;object-fit:cover;transition: transform .3s ease;}

/* ==== Fullscreen zoom ==== */
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:999;}
#lightbox img{max-width:90%;max-height:90%;object-fit:contain;cursor:zoom-out;transition: transform .3s ease;}
</style>
</head>
<body>

<div class="header">
<div class="logo">deklonio</div>

<!-- Fullscreen zoom overlay -->
<div id="lightbox">
<img src="" alt="">
</div>

<script>
// Fullscreen zoom
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');

document.querySelectorAll('.box img, .banner-box img').forEach(img=>{
  img.addEventListener('click', ()=>{
    lightbox.style.display='flex';
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener('click', ()=>{
  lightbox.style.display='none';
  lightboxImg.src='';
});
</script>

</body>
</html>
