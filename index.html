<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}
.logo-section{
display:flex;
flex-direction:column;
gap:5px;
}
.logo{
font-size:32px;
font-weight:700;
}
.sub-logo{
font-size:20px;
color:#38bdf8;
font-weight:500;
}
.tagline{
font-size:16px;
color:#a1a1aa;
}
.contact a{
color:white;
text-decoration:none;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
}
.buttons{
display:flex;
gap:15px;
margin-top:30px;
}
.btn{
padding:10px 25px;
border-radius:30px;
text-decoration:none;
font-weight:600;
font-size:14px;
transition:all .35s ease;
background:#38bdf8;
color:white;
}
.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(56,189,248,.4);
}

/* ===== Grid المربعات ===== */
.package-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
gap:25px;
margin-top:40px;
justify-items:center;
}
.box{
width:200px;
height:200px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
}
.box:hover{
transform:translateY(-10px);
border:1px solid #444;
box-shadow:0 20px 30px rgba(0,0,0,.7);
}
.box img{
width:100%;
height:100%;
object-fit:cover;
}
/* zoom */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}
#lightbox img{
max-width:90%;
max-height:90%;
}
</style>
</head>
<body>

<div class="header">
<div class="logo-section">
<div class="logo">deklonio</div>
<div class="sub-logo">website</div>
<div class="tagline">The best designer</div>
</div>

<div class="contact">
<a href="https://wa.me/201037011985" target="_blank">
<i class="fa-brands fa-whatsapp"></i> +201037011985
</a>
</div>
</div>

<!-- Buttons for categories -->
<div class="buttons">
<a href="#" class="btn">Logos</a>
<a href="#" class="btn">Banners</a>
<a href="#" class="btn">Packages</a>
<a href="#" class="btn">Price lists</a>
</div>

<!-- Logos grid -->
<div class="package-grid">
<div class="box"><img src="logo1.png" alt=""></div>
<div class="box"><img src="logo2.png" alt=""></div>
<div class="box"><img src="logo3.png" alt=""></div>
<div class="box"><img src="logo4.png" alt=""></div>
<div class="box"><img src="logo5.png" alt=""></div>
<div class="box"><img src="logo6.png" alt=""></div>
<div class="box"><img src="logo7.png" alt=""></div>
<div class="box"><img src="logo8.png" alt=""></div>
<div class="box"><img src="logo9.png" alt=""></div>
<div class="box"><img src="logo10.png" alt=""></div>
</div>

<!-- zoom -->
<div id="lightbox">
<img src="">
</div>

<script>
const lightbox = document.getElementById("lightbox")
const lightImg = lightbox.querySelector("img")
document.querySelectorAll(".package-grid img").forEach(img=>{
img.onclick = ()=>{
lightbox.style.display = "flex"
lightImg.src = img.src
}
})
lightbox.onclick = ()=>{
lightbox.style.display = "none"
}
</script>

</body>
</html>
