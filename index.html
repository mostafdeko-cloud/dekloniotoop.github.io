<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top, #0f172a, #050505 60%, #000);
color:white;
}

/* ===== GLASS EFFECT BASE ===== */
.glass{
background: rgba(255,255,255,0.06);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 8px 32px rgba(0,0,0,0.4);
border-radius: 16px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
padding:20px;
}

.logo-section{
display:flex;
flex-direction:column;
gap:5px;
}

@keyframes float{
0%{ transform:translateY(0); }
50%{ transform:translateY(-6px); }
100%{ transform:translateY(0); }
}

.logo{
font-size:32px;
font-weight:700;
animation:float 3s ease-in-out infinite;
}

.sub-logo{
font-size:20px;
color:#38bdf8;
font-weight:500;
}

.tagline{
font-size:16px;
color:#a1a1aa;
}

/* CONTACT */
.contact a{
color:white;
text-decoration:none;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}

/* BUTTONS */
.buttons{
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
padding:12px 25px;
border-radius:999px;
text-decoration:none;
font-weight:600;
font-size:14px;
transition:.3s;
background: rgba(56,189,248,0.2);
border:1px solid rgba(56,189,248,0.4);
backdrop-filter: blur(10px);
color:white;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
background: rgba(56,189,248,0.35);
box-shadow:0 10px 25px rgba(56,189,248,0.3);
}

/* SECTION TITLE */
.section-title{
font-size:28px;
font-weight:700;
margin-top:60px;
margin-bottom:20px;
color:#38bdf8;
}

/* GRID */
.package-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
gap:25px;
margin-top:20px;
justify-items:center;
}

/* GLASS CARDS */
.box,
.tall-box,
.banner-box{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.35s;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

.box{
width:200px;
height:200px;
}

.tall-box{
width:200px;
height:300px;
}

.banner-box{
width:100%;
height:220px;
grid-column:1 / -1;
}

/* HOVER EFFECT */
.box:hover,
.tall-box:hover,
.banner-box:hover{
transform:translateY(-8px) scale(1.03);
border:1px solid rgba(56,189,248,0.5);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* IMAGES */
.box img,
.tall-box img,
.banner-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
backdrop-filter: blur(10px);
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

/* RESPONSIVE */
@media(max-width:600px){

body{
padding:20px;
}

.logo{font-size:26px;}
.sub-logo{font-size:18px;}
.tagline{font-size:14px;}

.package-grid{
grid-template-columns:1fr;
}

.box,
.tall-box{
width:100%;
max-width:320px;
}
}
</style>
</head>

<body>

<div class="header glass">
<div class="logo-section">
<div class="logo">deklonio</div>
<div class="sub-logo">website</div>
<div class="tagline">The best designer</div>
</div>

<div class="contact">
<a href="https://wa.me/201037011985" target="_blank">
<i class="fa-brands fa-whatsapp"></i> +201037011985
</a>
</div>
</div>

<div class="buttons">
<a href="#logos" class="btn">Logos</a>
<a href="#banners" class="btn">Banners</a>
<a href="packages.html" class="btn">Packages</a>
<a href="#prices" class="btn">Price lists</a>
</div>

<div id="logos" class="section-title">Logos</div>
<div class="package-grid">
<div class="box"><img src="logo1.png"></div>
<div class="box"><img src="logo2.png"></div>
<div class="box"><img src="logo3.png"></div>
<div class="box"><img src="logo4.png"></div>
<div class="box"><img src="logo5.png"></div>
<div class="box"><img src="logo6.png"></div>
<div class="box"><img src="logo7.png"></div>
<div class="box"><img src="logo8.png"></div>
<div class="box"><img src="logo9.png"></div>
<div class="box"><img src="logo10.png"></div>
<div class="box"><img src="logo11.png"></div>
<div class="box"><img src="logo12.png"></div>
</div>

<div id="banners" class="section-title">Banners</div>
<div class="package-grid">
<div class="banner-box"><img src="banner1.png"></div>
<div class="banner-box"><img src="banner2.png"></div>
<div class="banner-box"><img src="banner3.png"></div>
<div class="banner-box"><img src="banner4.png"></div>
<div class="banner-box"><img src="banner5.png"></div>
</div>

<div id="prices" class="section-title">Price Lists</div>
<div class="package-grid">
<div class="box"><img src="price1.png"></div>
<div class="box"><img src="price2.png"></div>
<div class="box"><img src="price3.png"></div>
<div class="box"><img src="price4.png"></div>
<div class="box"><img src="price5.png"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<img src="">
</div>

<script>
const lightbox = document.getElementById("lightbox");
const lightImg = lightbox.querySelector("img");

document.querySelectorAll(".package-grid img").forEach(img=>{
img.onclick = ()=>{
lightImg.src = img.src;
lightbox.style.display = "flex";
}
});

lightbox.onclick = ()=>{
lightbox.style.display = "none";
}
</script>

</body>
</html>
