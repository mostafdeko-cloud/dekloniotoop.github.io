<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:60px;
}

.logo{
font-size:32px;
font-weight:700;
}

/* whatsapp */

.whatsapp{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

.whatsapp i{
color:#25D366;
font-size:20px;
}

.whatsapp:hover{
transform:translateY(-4px);
color:#25D366;
}

/* sections */

.section{
margin-bottom:80px;
}

.section h2{
margin-bottom:30px;
font-size:28px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:25px;
}

/* مربعات */

.box{
width:200px;
height:200px;
background:#151515;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
border:1px solid #222;
transition:.3s;
cursor:pointer;
}

.box:hover{
transform:translateY(-8px);
border:1px solid #555;
box-shadow:0 15px 25px rgba(0,0,0,0.6);
}

/* banners */

.banner-box{
width:100%;
height:150px;
background:#151515;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
border:1px solid #222;
transition:.3s;
cursor:pointer;
}

.banner-box:hover{
transform:translateY(-8px);
border:1px solid #555;
box-shadow:0 15px 25px rgba(0,0,0,0.6);
}

.banner-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">deklonio</div>

<a class="whatsapp" href="https://wa.me/201037011985" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
+201037011985
</a>

</div>

<!-- Logos -->

<div class="section">
<h2>Logos</h2>

<div class="grid">

<div class="box">Logo 1</div>
<div class="box">Logo 2</div>
<div class="box">Logo 3</div>
<div class="box">Logo 4</div>
<div class="box">Logo 5</div>
<div class="box">Logo 6</div>
<div class="box">Logo 7</div>
<div class="box">Logo 8</div>
<div class="box">Logo 9</div>
<div class="box">Logo 10</div>

</div>
</div>

<!-- Banners -->

<div class="section">
<h2>Banners</h2>

<div class="banner-grid">

<div class="banner-box">Banner 1</div>
<div class="banner-box">Banner 2</div>
<div class="banner-box">Banner 3</div>
<div class="banner-box">Banner 4</div>
<div class="banner-box">Banner 5</div>
<div class="banner-box">Banner 6</div>
<div class="banner-box">Banner 7</div>
<div class="banner-box">Banner 8</div>

</div>
</div>

<!-- Packages -->

<div class="section">
<h2>Packages</h2>

<div class="grid">

<div class="box">Package 1</div>
<div class="box">Package 2</div>
<div class="box">Package 3</div>

</div>
</div>

<!-- Price Lists -->

<div class="section">
<h2>Price Lists</h2>

<div class="grid">

<div class="box">Price 1</div>
<div class="box">Price 2</div>
<div class="box">Price 3</div>
<div class="box">Price 4</div>
<div class="box">Price 5</div>
<div class="box">Price 6</div>

</div>
</div>

</body>
</html>
