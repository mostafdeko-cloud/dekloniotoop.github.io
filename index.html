<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:50px;
}

.logo{
font-size:32px;
font-weight:700;
letter-spacing:2px;
}

.contact a{
color:white;
text-decoration:none;
font-weight:600;
}

/* menu */

.menu{
display:flex;
gap:20px;
margin-bottom:60px;
flex-wrap:wrap;
}

.menu a{
text-decoration:none;
color:white;
padding:8px 20px;
border-radius:25px;
background:#00bfff;
font-size:14px;
transition:.3s;
}

.menu a:hover{
transform:translateY(-4px);
opacity:.8;
}

/* sections */

.section{
margin-bottom:80px;
}

.section h2{
margin-bottom:30px;
font-size:28px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:25px;
justify-content:center;
}

/* مربعات */

.box{
width:200px;
height:200px;
background:#151515;
border-radius:15px;
overflow:hidden;
border:1px solid #222;
transition:.3s;
cursor:pointer;
}

.box:hover{
transform:translateY(-8px);
border:1px solid #555;
box-shadow:0 15px 25px rgba(0,0,0,0.6);
}

/* صورة اللوجو */

.box img{
width:100%;
height:100%;
object-fit:cover;
}

/* banners */

.banner-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
}

.banner-box{
width:100%;
height:150px;
background:#151515;
border-radius:15px;
overflow:hidden;
border:1px solid #222;
transition:.3s;
}

.banner-box:hover{
transform:translateY(-8px);
border:1px solid #555;
box-shadow:0 15px 25px rgba(0,0,0,0.6);
}

.banner-box img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">deklonio</div>

<div class="contact">
<a href="https://wa.me/201037011985">+201037011985</a>
</div>

</div>

<div class="menu">
<a href="#logos">Logos</a>
<a href="#banners">Banners</a>
<a href="#packages">Packages</a>
<a href="#prices">Price Lists</a>
</div>

<!-- Logos -->

<div class="section" id="logos">
<h2>Logos</h2>

<div class="grid">

<div class="box"><img src="logo1.png"></div>
<div class="box"><img src="logo2.png"></div>
<div class="box"><img src="logo3.png"></div>
<div class="box"><img src="logo4.png"></div>
<div class="box"><img src="logo5.png"></div>

<div class="box"><img src="logo7.png"></div>
<div class="box"><img src="logo8.png"></div>
<div class="box"><img src="logo9.png"></div>
<div class="box"><img src="logo10.png"></div>

</div>
</div>

<!-- Banners -->

<div class="section" id="banners">
<h2>Banners</h2>

<div class="banner-grid">

<div class="banner-box"><img src="banner1.png"></div>
<div class="banner-box"><img src="banner2.png"></div>
<div class="banner-box"><img src="banner3.png"></div>
<div class="banner-box"><img src="banner4.png"></div>
<div class="banner-box"><img src="banner5.png"></div>
<div class="banner-box"><img src="banner6.png"></div>
<div class="banner-box"><img src="banner7.png"></div>
<div class="banner-box"><img src="banner8.png"></div>
<div class="banner-box"><img src="banner9.png"></div>
<div class="banner-box"><img src="banner10.png"></div>

</div>
</div>

<!-- Packages -->

<div class="section" id="packages">
<h2>Packages</h2>
<div class="grid">
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>

<div class="box"></div>

</div>
</div>

<!-- Prices -->

</body>
</html>
