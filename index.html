<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>

body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.logo{
font-size:32px;
font-weight:700;
letter-spacing:1px;
}

.contact a{
color:white;
text-decoration:none;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
font-size:15px;
}

/* menu */

.menu{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:35px;
}

.menu a{
text-decoration:none;
color:white;
padding:10px 26px;
border-radius:25px;
background:#00bfff;
transition:.3s;
font-size:14px;
}

.menu a:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,191,255,.4);
}

/* sections */

.section-title{
margin-top:45px;
margin-bottom:18px;
font-size:24px;
font-weight:600;
letter-spacing:.5px;
}

/* grids */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:25px;
justify-content:center;
}

.banner-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
}

/* boxes */

.box{
width:200px;
height:200px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
transition:.35s;
cursor:pointer;
}

.banner-box{
height:150px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
transition:.35s;
cursor:pointer;
}

.box:hover,
.banner-box:hover{
transform:translateY(-10px);
border:1px solid #444;
box-shadow:0 20px 30px rgba(0,0,0,.7);
}

.box img,
.banner-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* zoom */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<!-- header -->

<div class="header">

<div class="logo">deklonio</div>

<div class="contact">
<a href="https://wa.me/201037011985" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
+201037011985
</a>
</div>

</div>

<!-- menu -->

<div class="menu">
<a href="#logos">Logos</a>
<a href="#banners">Banners</a>
<a href="#prices">Price Lists</a>
<a href="packages.html">Packages</a>
</div>

<!-- logos -->

<div id="logos" class="section-title">Logos</div>

<div class="grid">

<img class="box" src="logo1.png">
<img class="box" src="logo2.png">
<img class="box" src="logo3.png">
<img class="box" src="logo4.png">
<img class="box" src="logo5.png">
<img class="box" src="logo6.png">
<img class="box" src="logo7.png">
<img class="box" src="logo8.png">
<img class="box" src="logo9.png">
<img class="box" src="logo10.png">
<img class="box" src="logo11.png">
<img class="box" src="logo12.png">

</div>

<!-- banners -->

<div id="banners" class="section-title">Banners</div>

<div class="banner-grid">

<img class="banner-box" src="banner1.png">
<img class="banner-box" src="banner2.png">
<img class="banner-box" src="banner3.png">
<img class="banner-box" src="banner4.png">
<img class="banner-box" src="banner5.png">

</div>

<!-- price lists -->

<div id="prices" class="section-title">Price Lists</div>

<div class="grid">

<img class="box" src="price1.png">
<img class="box" src="price2.png">
<img class="box" src="price3.png">
<img class="box" src="price4.png">
<img class="box" src="price5.png">

</div>

<!-- zoom -->

<div id="lightbox">
<img src="">
</div>

<script>

const lightbox = document.getElementById("lightbox")
const lightImg = lightbox.querySelector("img")

document.querySelectorAll("img").forEach(img=>{
img.onclick = ()=>{
lightbox.style.display = "flex"
lightImg.src = img.src
}
})

lightbox.onclick = ()=>{
lightbox.style.display = "none"
}

</script>

</body>
</html>
