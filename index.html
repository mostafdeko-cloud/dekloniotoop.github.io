<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio Packages</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
}
.logo-section{
display:flex;
flex-direction:column;
gap:5px;
}
@keyframes float{
0%{ transform:translateY(0); }
50%{ transform:translateY(-6px); }
100%{ transform:translateY(0); }
}
.logo{
font-size:32px;
font-weight:700;
animation:float 3s ease-in-out infinite;
}
.sub-logo{
font-size:20px;
color:#38bdf8;
font-weight:500;
animation:float 3.2s ease-in-out infinite;
}
.tagline{
font-size:16px;
color:#a1a1aa;
animation:float 3.4s ease-in-out infinite;
}
.contact a{
color:white;
text-decoration:none;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}
.back-btn{
margin-top:20px;
padding:10px 25px;
border-radius:30px;
text-decoration:none;
font-weight:600;
font-size:14px;
transition:all .35s ease;
background:#38bdf8;
color:white;
display:inline-block;
}
.back-btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(56,189,248,.4);
}

/* ===== Grid المربعات ===== */
.package-container{
margin-top:30px;
display:flex;
flex-direction:column;
gap:50px; 
}
.package-title{
font-size:22px;
font-weight:600;
margin-bottom:15px;
color:#38bdf8;
}
.package-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
gap:25px;
justify-items:center;
}
.box{
width:200px;
height:200px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
}
.tall-box{
width:200px;
height:300px;
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
}
.banner-box{
width:100%;
height:220px; 
background:#151515;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.35s;
grid-column:span 2; 
}
.box:hover,
.tall-box:hover,
.banner-box:hover{
transform:translateY(-10px);
border:1px solid #444;
box-shadow:0 20px 30px rgba(0,0,0,.7);
}
.box img,
.tall-box img,
.banner-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* zoom */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}
#lightbox img{
max-width:90%;
max-height:90%;
}
</style>
</head>
<body>

<div class="header">
<div class="logo-section">
<div class="logo">deklonio</div>
<div class="sub-logo">website</div>
<div class="tagline">The best designer</div>
</div>

<div class="contact">
<a href="https://wa.me/201037011985" target="_blank">
<i class="fa-brands fa-whatsapp" style="color:white;"></i> +201037011985
</a>
</div>
</div>

<a href="index.html" class="back-btn">Back</a>

<div class="package-container">

<!-- Package 4 -->
<div class="package-title">Package 4</div>

</div>

<!-- zoom -->
<div id="lightbox">
<img src="">
</div>

<script>
const lightbox = document.getElementById("lightbox")
const lightImg = lightbox.querySelector("img")
document.querySelectorAll(".package-grid img").forEach(img=>{
img.onclick = ()=>{
lightbox.style.display = "flex"
lightImg.src = img.src
}
})
lightbox.onclick = ()=>{
lightbox.style.display = "none"
}
</script>

</body>
  </html>
