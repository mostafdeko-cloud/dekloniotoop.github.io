<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio - Anime Style</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top, #1a1400, #000000 60%);
color:white;
overflow-x:hidden;
}

/* ===== glowing background effect ===== */
body::before{
content:"";
position:fixed;
top:-200px;
left:-200px;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(255,215,0,0.25), transparent 60%);
filter:blur(60px);
animation:floatGlow 6s ease-in-out infinite;
}

body::after{
content:"";
position:fixed;
bottom:-200px;
right:-200px;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(255,200,0,0.18), transparent 60%);
filter:blur(60px);
animation:floatGlow 7s ease-in-out infinite;
}

@keyframes floatGlow{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-30px);}
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:40px;
padding:20px;
border:1px solid rgba(255,215,0,0.2);
border-radius:18px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.logo{
font-size:34px;
font-weight:800;
color:#ffd700;
text-shadow:0 0 15px rgba(255,215,0,0.6);
animation:glowText 3s infinite alternate;
}

@keyframes glowText{
from{ text-shadow:0 0 10px #ffd700; }
to{ text-shadow:0 0 25px #ffea70; }
}

.sub-logo{
color:#ffcc00;
font-size:18px;
font-weight:600;
}

.tagline{
color:#aaa;
font-size:14px;
}

/* CONTACT */
.contact a{
color:#ffd700;
text-decoration:none;
font-weight:700;
display:flex;
align-items:center;
gap:8px;
}

/* BUTTONS */
.buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:25px;
}

.btn{
padding:12px 26px;
border-radius:999px;
text-decoration:none;
font-weight:700;
font-size:14px;
color:#000;
background:linear-gradient(45deg,#ffd700,#ffb300);
box-shadow:0 0 15px rgba(255,215,0,0.4);
transition:.3s;
}

.btn:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 0 25px rgba(255,215,0,0.8);
}

/* SECTION TITLE */
.section-title{
margin-top:60px;
margin-bottom:20px;
font-size:28px;
font-weight:800;
color:#ffd700;
text-shadow:0 0 10px rgba(255,215,0,0.5);
}

/* GRID */
.package-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:25px;
justify-items:center;
}

/* ANIME CARDS */
.box,
.tall-box,
.banner-box{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,215,0,0.25);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(0,0,0,0.6);
position:relative;
}

.box::after,
.tall-box::after,
.banner-box::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,215,0,0.15),transparent);
transition:.6s;
}

.box:hover::after,
.tall-box:hover::after,
.banner-box:hover::after{
left:100%;
}

.box{
width:200px;
height:200px;
}

.tall-box{
width:200px;
height:300px;
}

.banner-box{
width:100%;
height:220px;
grid-column:1 / -1;
}

.box:hover,
.tall-box:hover,
.banner-box:hover{
transform:translateY(-8px) scale(1.04);
border-color:#ffd700;
box-shadow:0 0 30px rgba(255,215,0,0.5);
}

/* IMAGES */
.box img,
.tall-box img,
.banner-box img{
width:100%;
height:100%;
object-fit:cover;
filter:contrast(1.1) saturate(1.2);
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
backdrop-filter:blur(8px);
}

#lightbox img{
max-width:90%;
max-height:90%;
border:2px solid #ffd700;
border-radius:12px;
box-shadow:0 0 30px rgba(255,215,0,0.4);
}

/* RESPONSIVE */
@media(max-width:600px){
body{padding:20px;}
.logo{font-size:26px;}

.package-grid{
grid-template-columns:1fr;
}

.box,
.tall-box{
width:100%;
max-width:320px;
}
}
</style>
</head>

<body>

<div class="header">
<div>
<div class="logo">deklonio</div>
<div class="sub-logo">anime studio</div>
<div class="tagline">Golden creative designer</div>
</div>

<div class="contact">
<a href="https://wa.me/201037011985">
<i class="fa-brands fa-whatsapp"></i> Contact
</a>
</div>
</div>

<div class="buttons">
<a class="btn" href="#logos">Logos</a>
<a class="btn" href="#banners">Banners</a>
<a class="btn" href="packages.html">Packages</a>
<a class="btn" href="#prices">Prices</a>
</div>

<div id="logos" class="section-title">Logos</div>
<div class="package-grid">
<div class="box"><img src="logo1.png"></div>
<div class="box"><img src="logo2.png"></div>
<div class="box"><img src="logo3.png"></div>
<div class="box"><img src="logo4.png"></div>
<div class="box"><img src="logo5.png"></div>
<div class="box"><img src="logo6.png"></div>
<div class="box"><img src="logo7.png"></div>
<div class="box"><img src="logo8.png"></div>
<div class="box"><img src="logo9.png"></div>
<div class="box"><img src="logo10.png"></div>
<div class="box"><img src="logo11.png"></div>
<div class="box"><img src="logo12.png"></div>
</div>

<div id="banners" class="section-title">Banners</div>
<div class="package-grid">
<div class="banner-box"><img src="banner1.png"></div>
<div class="banner-box"><img src="banner2.png"></div>
<div class="banner-box"><img src="banner3.png"></div>
<div class="banner-box"><img src="banner4.png"></div>
<div class="banner-box"><img src="banner5.png"></div>
</div>

<div id="prices" class="section-title">Price Lists</div>
<div class="package-grid">
<div class="box"><img src="price1.png"></div>
<div class="box"><img src="price2.png"></div>
<div class="box"><img src="price3.png"></div>
<div class="box"><img src="price4.png"></div>
<div class="box"><img src="price5.png"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<img src="">
</div>

<script>
const lightbox = document.getElementById("lightbox");
const lightImg = lightbox.querySelector("img");

document.querySelectorAll(".package-grid img").forEach(img=>{
img.onclick=()=>{
lightImg.src=img.src;
lightbox.style.display="flex";
}
});

lightbox.onclick=()=>{
lightbox.style.display="none";
}
</script>

</body>
</html>
