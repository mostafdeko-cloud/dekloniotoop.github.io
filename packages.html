<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deklonio Packages</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:40px;
}

.logo-section{
display:flex;
flex-direction:column;
gap:5px;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

.logo{
font-size:32px;
font-weight:700;
animation:float 3s ease-in-out infinite;
}

.sub-logo{
font-size:20px;
color:#38bdf8;
}

.tagline{
font-size:14px;
color:#a1a1aa;
}

/* CONTACT */
.contact a{
color:white;
text-decoration:none;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}

/* BACK BUTTON */
.back-btn{
margin-top:20px;
display:inline-block;
padding:10px 22px;
border-radius:999px;
background:#38bdf8;
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.back-btn:hover{
transform:translateY(-4px) scale(1.05);
}

/* SECTIONS */
.package-container{
margin-top:40px;
display:flex;
flex-direction:column;
gap:60px;
}

.package-title{
font-size:26px;
font-weight:700;
color:#38bdf8;
margin-bottom:15px;
}

/* GRID */
.package-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:25px;
justify-items:center;
}

.box{
width:200px;
height:200px;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.35s;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
}

.tall-box{
width:200px;
height:300px;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.35s;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
}

.banner-box{
width:100%;
height:220px;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.35s;
grid-column:1 / -1;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
}

/* HOVER */
.box:hover,
.tall-box:hover,
.banner-box:hover{
transform:translateY(-8px) scale(1.02);
border:1px solid rgba(56,189,248,0.5);
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

/* IMAGES */
.box img,
.tall-box img,
.banner-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.25s;
z-index:999;
}

#lightbox.show{
opacity:1;
visibility:visible;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

/* RESPONSIVE */
@media(max-width:600px){

body{
padding:20px;
}

.logo{font-size:26px;}
.sub-logo{font-size:18px;}

.package-grid{
grid-template-columns:1fr;
}

.box,
.tall-box{
width:100%;
max-width:320px;
}

.banner-box{
grid-column:1 / -1;
}
}
</style>
</head>

<body>

<div class="logo-section">
<div class="logo">deklonio</div>

</div>

<div class="contact">
<a href="https://wa.me/201037011985" target="_blank">

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<img src="">
</div>

<script>
const lightbox=document.getElementById("lightbox");
const lightImg=lightbox.querySelector("img");

document.querySelectorAll(".package-grid img").forEach(img=>{
img.addEventListener("click",()=>{
lightImg.src=img.src;
lightbox.classList.add("show");
});
});

lightbox.addEventListener("click",()=>{
lightbox.classList.remove("show");
});

document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
lightbox.classList.remove("show");
}
});
</script>
